<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support - PropLifting</title>
  <meta name="description" content="Get help with PropLifting. Send us a message and we'll get back to you.">
  <link rel="icon" href="../icon-192.png" type="image/png">
  <style>
    :root {
      --green: #2D7D3F;
      --green-light: #E8F5E9;
      --dark: #1a1a1a;
      --muted: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--dark);
      background: #fafafa;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .back {
      position: absolute;
      top: 24px;
      left: 24px;
      color: var(--green);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
    .back:hover { text-decoration: underline; }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    h1 span { color: var(--green); }
    .subtitle {
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    form {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    input, textarea {
      font-family: inherit;
      font-size: 15px;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus {
      border-color: var(--green);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: var(--green);
      color: #fff;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--muted);
      font-size: 13px;
    }
    .footer a { color: var(--green); text-decoration: none; }

    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      form { padding: 24px; }
    }
  </style>
</head>
<body>
  <a href="/" class="back">&larr; Back</a>
  <div class="page">
    <h1>Get <span>Support</span></h1>
    <p class="subtitle">We'd love to hear from you.</p>

    <form id="support-form">
      <label>
        Name
        <input type="text" id="name" placeholder="Your name" required>
      </label>
      <label>
        Email
        <input type="email" id="email" placeholder="you@example.com" required>
      </label>
      <label>
        Message
        <textarea id="message" placeholder="How can we help?" required></textarea>
      </label>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>

  <div class="footer">
    &copy; 2026 PropLifting &middot; <a href="mailto:hello@proplifting.app">hello@proplifting.app</a>
  </div>

  <script>
    document.getElementById('support-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var message = document.getElementById('message').value;
      var subject = encodeURIComponent('Support request from ' + name);
      var body = encodeURIComponent('From: ' + name + ' (' + email + ')\n\n' + message);
      window.location.href = 'mailto:hello@proplifting.app?subject=' + subject + '&body=' + body;
    });
  </script>
</body>
</html>
